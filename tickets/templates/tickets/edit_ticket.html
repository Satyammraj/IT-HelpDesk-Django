{% extends 'base.html' %}

{% block title %}Edit Ticket{% endblock %}

{% block content %}

<h2 class="mb-4">

Edit Ticket #{{ ticket.id }}

</h2>

<div class="card shadow">

<div class="card-body">

<form method="post" enctype="multipart/form-data">

{% csrf_token %}

{{ form.as_p }}

<button class="btn btn-success">

Save Changes

</button>

<a href="{% url 'ticket_list' %}" class="btn btn-secondary">

Cancel

</a>

</form>

</div>

</div>

{% endblock %}
