{% load static %}

<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Password Reset</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">

    <!-- Typography: matches base.html / login.html's "Panel" theme -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@500;600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="{% static 'tickets/css/style.css' %}">

    <style>
        :root {
            --indigo: #2563EB;
            --indigo-hover: #1D4ED8;
            --indigo-soft: #EFF6FF;

            --ink: #0F172A;
            --ink-soft: #334155;
            --ink-faint: #64748B;

            --paper: #E4EAF2;
            --card: #FFFFFF;
            --border: #D3DCE6;

            --danger: #DA373C;
            --danger-bg: #FDECEC;

            --radius-sm: 8px;
            --radius-md: 12px;
            --radius-lg: 16px;
            --shadow-md: 0 8px 28px rgba(15, 23, 42, 0.10);
        }

        * {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
        }

        html {
            /* Prevent iOS auto-zoom / stray horizontal scroll, same as base.html */
            -webkit-text-size-adjust: 100%;
        }

        body {
            overflow-x: hidden;
        }

        body.bg-light {
            background: var(--paper) !important;
            min-height: 100vh;
        }

        /* min-height instead of a hard vh-100 row so content isn't
           clipped if mobile browser chrome shrinks the viewport */
        .row.vh-100 {
            min-height: 100vh;
            height: auto;
            padding: 1.25rem 0;
        }

        .card.shadow {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg) !important;
            box-shadow: var(--shadow-md) !important;
        }

        .card-body.p-5 {
            padding: 2.75rem 2.5rem !important;
        }

        h2.text-center {
            font-family: 'Manrope', sans-serif;
            font-weight: 800;
            color: var(--ink) !important;
            font-size: 1.4rem;
            letter-spacing: -0.01em;
        }

        h2.text-center::before {
            content: "\F3E4";
            font-family: "bootstrap-icons" !important;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 56px;
            height: 56px;
            margin: 0 auto 1rem;
            border-radius: var(--radius-md);
            background: var(--indigo);
            color: #fff;
            font-size: 1.4rem;
        }

        p.text-muted.text-center {
            font-size: 0.88rem;
            font-weight: 500;
            color: var(--ink-faint) !important;
            margin-bottom: 1.75rem;
        }

        /* Django's form.as_p renders bare <p><label><input> — style it
           directly so it matches the rest of the app's inputs. */
        form p {
            margin-bottom: 1.15rem;
        }

        form label {
            display: block;
            font-weight: 700;
            font-size: 0.78rem;
            color: var(--ink);
            margin-bottom: 0.4rem;
        }

        form input[type="text"],
        form input[type="email"] {
            width: 100%;
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            padding: 0.65rem 0.9rem;
            background: var(--paper);
            color: var(--ink);
            /* 16px stops iOS Safari auto-zooming into the field on focus */
            font-size: 16px;
        }

        form input:focus {
            outline: none;
            border-color: var(--indigo);
            box-shadow: 0 0 0 3px var(--indigo-soft);
            background: var(--card);
        }

        form .helptext {
            display: block;
            font-size: 0.76rem;
            color: var(--ink-faint);
            margin-top: 0.35rem;
        }

        form ul.errorlist {
            list-style: none;
            padding: 0.6rem 0.85rem;
            margin: 0 0 0.6rem;
            background: var(--danger-bg);
            color: var(--danger);
            border-radius: var(--radius-sm);
            font-size: 0.82rem;
            font-weight: 500;
        }

        .btn-primary {
            background: var(--indigo);
            border-color: var(--indigo);
            font-weight: 600;
            padding: 0.65rem 1rem;
            border-radius: var(--radius-sm);
            margin-top: 0.5rem;
        }

        .btn-primary:hover, .btn-primary:focus {
            background: var(--indigo-hover);
            border-color: var(--indigo-hover);
        }

        a {
            color: var(--indigo);
            font-weight: 500;
            font-size: 0.88rem;
            text-decoration: none;
        }

        a:hover {
            color: var(--indigo-hover);
            text-decoration: underline;
        }

        /* ================= RESPONSIVE TWEAKS (mirrors base.html) ================= */

        @media (max-width: 767.98px) {
            .card-body.p-5 {
                padding: 2.25rem 1.75rem !important;
            }

            h2.text-center::before {
                width: 48px;
                height: 48px;
                font-size: 1.25rem;
            }

            h2.text-center {
                font-size: 1.2rem;
            }
        }

        @media (max-width: 575.98px) {
            .row.vh-100 {
                padding: 1rem 0;
            }

            .card-body.p-5 {
                padding: 1.75rem 1.25rem !important;
            }
        }
    </style>

</head>

<body class="bg-light">

<div class="container">

    <div class="row justify-content-center align-items-center vh-100">

        <div class="col-md-5">

            <div class="card shadow">

                <div class="card-body p-5">

                    <h2 class="text-center text-primary mb-4">

                        Reset Password

                    </h2>

                    <p class="text-muted text-center">

                        Enter your email address and we'll send you a password reset link.

                    </p>

                    <form method="post">

                        {% csrf_token %}

                        {{ form.as_p }}

                        <button class="btn btn-primary w-100">

                            Send Reset Link

                        </button>

                    </form>

                    <div class="text-center mt-3">

                        <a href="{% url 'login' %}">

                            Back to Login

                        </a>

                    </div>

                </div>

            </div>

        </div>

    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
