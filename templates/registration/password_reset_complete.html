{% load static %}

<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Password Changed</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">

    <!-- Typography: matches base.html / login.html's "Panel" theme -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@500;600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="{% static 'tickets/css/style.css' %}">

    <style>
        :root {
            --indigo: #2563EB;
            --indigo-hover: #1D4ED8;
            --indigo-soft: #EFF6FF;

            --ink: #0F172A;
            --ink-soft: #334155;
            --ink-faint: #64748B;

            --paper: #E4EAF2;
            --card: #FFFFFF;
            --border: #D3DCE6;

            --success: #16A34A;
            --success-bg: #DCFCE7;

            --radius-sm: 8px;
            --radius-md: 12px;
            --radius-lg: 16px;
            --shadow-md: 0 8px 28px rgba(15, 23, 42, 0.10);
        }

        * {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
        }

        html {
            /* Prevent iOS auto-zoom / stray horizontal scroll, same as base.html */
            -webkit-text-size-adjust: 100%;
        }

        body {
            overflow-x: hidden;
        }

        body.bg-light {
            background: var(--paper) !important;
            min-height: 100vh;
        }

        /* min-height instead of a hard vh-100 on the wrapper so content
           never gets clipped if mobile browser chrome shrinks the
           viewport mid-scroll (handled via a class override below) */
        .container.vh-100 {
            min-height: 100vh;
            height: auto;
            padding: 1.25rem;
        }

        .card.shadow {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg) !important;
            box-shadow: var(--shadow-md) !important;
            width: 100%;
        }

        .card.shadow.p-5 {
            padding: 3rem 2.75rem !important;
            max-width: 420px;
        }

        /* Success icon badge, echoing the navbar/login brand mark */
        .card.shadow.p-5::before {
            content: "\F26A";
            font-family: "bootstrap-icons" !important;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 60px;
            height: 60px;
            margin: 0 auto 1.25rem;
            border-radius: 50%;
            background: var(--success-bg);
            color: var(--success);
            font-size: 1.6rem;
        }

        h2.text-success {
            font-family: 'Manrope', sans-serif;
            font-weight: 800;
            color: var(--ink) !important;
            font-size: 1.4rem;
            letter-spacing: -0.01em;
            margin-bottom: 0.5rem;
        }

        p {
            color: var(--ink-faint);
            font-size: 0.92rem;
            margin-bottom: 1.75rem;
        }

        .btn-primary {
            background: var(--indigo);
            border-color: var(--indigo);
            font-weight: 600;
            padding: 0.65rem 1.6rem;
            border-radius: var(--radius-sm);
        }

        .btn-primary:hover, .btn-primary:focus {
            background: var(--indigo-hover);
            border-color: var(--indigo-hover);
        }

        /* ================= RESPONSIVE TWEAKS (mirrors base.html) ================= */

        @media (max-width: 767.98px) {
            .card.shadow.p-5 {
                padding: 2.25rem 1.75rem !important;
            }

            .card.shadow.p-5::before {
                width: 52px;
                height: 52px;
                font-size: 1.4rem;
            }

            h2.text-success {
                font-size: 1.25rem;
            }
        }

        @media (max-width: 575.98px) {
            .container.vh-100 {
                padding: 1rem;
            }

            .card.shadow.p-5 {
                padding: 1.75rem 1.25rem !important;
                max-width: 100%;
            }

            .btn-primary {
                width: 100%;
            }
        }
    </style>

</head>

<body class="bg-light">

<div class="container vh-100 d-flex align-items-center justify-content-center">

    <div class="card shadow p-5 text-center">

        <h2 class="text-success">

            Password Updated

        </h2>

        <p>

            Your password has been changed successfully.

        </p>

        <a href="{% url 'login' %}" class="btn btn-primary">

            Login

        </a>

    </div>

</div>

</body>

</html>
