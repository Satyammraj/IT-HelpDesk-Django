{% load static %}

<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Choose New Password</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">

    <!-- Typography: matches base.html / login.html's "Panel" theme -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@500;600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="{% static 'tickets/css/style.css' %}">

    <style>
        :root {
            --indigo: #2563EB;
            --indigo-hover: #1D4ED8;
            --indigo-soft: #EFF6FF;

            --ink: #0F172A;
            --ink-soft: #334155;
            --ink-faint: #64748B;

            --paper: #E4EAF2;
            --card: #FFFFFF;
            --border: #D3DCE6;

            --danger: #DA373C;
            --danger-bg: #FDECEC;

            --radius-sm: 8px;
            --radius-md: 12px;
            --radius-lg: 16px;
            --shadow-md: 0 8px 28px rgba(15, 23, 42, 0.10);
        }

        * {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
        }

        body.bg-light {
            background: var(--paper) !important;
            min-height: 100vh;
        }

        .card.shadow {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg) !important;
            box-shadow: var(--shadow-md) !important;
        }

        .card-body.p-5 {
            padding: 2.75rem 2.5rem !important;
        }

        h2.text-center {
            font-family: 'Manrope', sans-serif;
            font-weight: 800;
            color: var(--ink) !important;
            font-size: 1.4rem;
            letter-spacing: -0.01em;
        }

        h2.text-center::before {
            content: "\F3FA";
            font-family: "bootstrap-icons" !important;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 56px;
            height: 56px;
            margin: 0 auto 1rem;
            border-radius: var(--radius-md);
            background: var(--indigo);
            color: #fff;
            font-size: 1.4rem;
        }

        p.text-center.text-muted {
            font-size: 0.88rem;
            font-weight: 500;
            color: var(--ink-faint) !important;
            margin-bottom: 1.75rem;
        }

        /* Django's form.as_p renders bare <p><label><input> — style it
           to match the rest of the app's inputs without touching the
           template logic. */
        form p {
            margin-bottom: 1.15rem;
        }

        form label {
            display: block;
            font-weight: 700;
            font-size: 0.78rem;
            color: var(--ink);
            margin-bottom: 0.4rem;
        }

        form input[type="text"],
        form input[type="password"],
        form input[type="email"] {
            width: 100%;
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            padding: 0.65rem 0.9rem;
            background: var(--paper);
            color: var(--ink);
            font-size: 0.92rem;
        }

        form input:focus {
            outline: none;
            border-color: var(--indigo);
            box-shadow: 0 0 0 3px var(--indigo-soft);
            background: var(--card);
        }

        form .helptext {
            display: block;
            font-size: 0.76rem;
            color: var(--ink-faint);
            margin-top: 0.35rem;
        }

        form ul.errorlist {
            list-style: none;
            padding: 0.6rem 0.85rem;
            margin: 0 0 0.6rem;
            background: var(--danger-bg);
            color: var(--danger);
            border-radius: var(--radius-sm);
            font-size: 0.82rem;
            font-weight: 500;
        }

        .btn-primary {
            background: var(--indigo);
            border-color: var(--indigo);
            font-weight: 600;
            padding: 0.65rem 1rem;
            border-radius: var(--radius-sm);
            margin-top: 0.5rem;
        }

        .btn-primary:hover, .btn-primary:focus {
            background: var(--indigo-hover);
            border-color: var(--indigo-hover);
        }

        @media (max-width: 576px) {
            .card-body.p-5 { padding: 2rem 1.5rem !important; }
        }
    </style>

</head>

<body class="bg-light">

<div class="container">

    <div class="row justify-content-center align-items-center vh-100">

        <div class="col-md-5">

            <div class="card shadow">

                <div class="card-body p-5">

                    <h2 class="text-center text-primary mb-4">

                        Create New Password

                    </h2>

                    <p class="text-center text-muted">

                        Enter your new password below.

                    </p>

                    <form method="post">

                        {% csrf_token %}

                        {{ form.as_p }}

                        <button class="btn btn-primary w-100">

                            Change Password

                        </button>

                    </form>

                </div>

            </div>

        </div>

    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
