{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}IT Help Desk{% endblock %}</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="{% static 'tickets/css/style.css' %}">
</head>

<body>

    <!-- ================= NAVBAR ================= -->

    <nav class="navbar navbar-expand-lg navbar-dark bg-primary shadow">

        <div class="container-fluid">

            <!-- Left -->

            <a class="navbar-brand fw-bold" href="{% url 'dashboard' %}">
                <i class="bi bi-headset"></i>
                IT Help Desk
            </a>

            <!-- Right -->

            <div class="ms-auto d-flex align-items-center">

                <div class="text-end me-3">

                    <div class="fw-bold text-white">

                        Welcome,
                        {{ request.user.username }}

                    </div>

                    <small class="text-white-50">

                        {% now "d M Y" %}

                    </small>

                </div>

                <a href="{% url 'profile' %}">

                    <img src="https://ui-avatars.com/api/?name={{ request.user.username }}&background=ffffff&color=0d6efd&size=128"
                        class="rounded-circle border border-white" width="45" height="45" alt="Profile">

                </a>

            </div>

        </div>

    </nav>

    <!-- ================= PAGE ================= -->

    <div class="container-fluid">

        <div class="row">

            <!-- Sidebar -->

            <div class="col-md-2 bg-dark text-white min-vh-100 p-3 shadow">


                <hr>

                <a href="{% url 'dashboard' %}" class="nav-link text-white mb-3">
                    <i class="bi bi-speedometer2 me-2"></i>
                    Dashboard
                </a>

                <a href="{% url 'ticket_list' %}" class="nav-link text-white mb-3">
                    <i class="bi bi-ticket-perforated me-2"></i>
                    Tickets
                </a>

                <a href="{% url 'create_ticket' %}" class="nav-link text-white mb-3">
                    <i class="bi bi-plus-circle me-2"></i>
                    Create Ticket
                </a>

                {% if request.user.is_staff %}

                <a href="{% url 'users_list' %}" class="nav-link text-white mb-3">
                    <i class="bi bi-people me-2"></i>
                    Users
                </a>

                {% endif %}
                <a href="{% url 'settings' %}" class="nav-link text-white mb-3">
                    <i class="bi bi-gear me-2"></i>
                    Settings
                </a>

                <a href="{% url 'logout' %}" class="nav-link text-danger">
                    <i class="bi bi-box-arrow-right me-2"></i>
                    Logout
                </a>

            </div>

            <!-- Main -->

            <div class="col-md-10 p-4">

                {% block content %}
                {% endblock %}

            </div>

        </div>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
