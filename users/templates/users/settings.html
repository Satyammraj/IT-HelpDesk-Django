{% extends "base.html" %}

{% block title %}Settings{% endblock %}

{% block content %}

<div class="container">

    <div class="card shadow">

        <div class="card-header bg-primary text-white">

            <h3 class="mb-0">

                <i class="bi bi-gear-fill"></i>

                Settings

            </h3>

        </div>

        <div class="card-body">

            <form method="post">

                {% csrf_token %}

                <h5 class="mb-3">Appearance</h5>

                <div class="form-check">

                    <input
                        class="form-check-input"
                        type="radio"
                        name="theme"
                        value="light"
                        {% if profile.theme == "light" %}checked{% endif %}>

                    <label class="form-check-label">

                        ☀️ Light Mode

                    </label>

                </div>

                <div class="form-check mb-4">

                    <input
                        class="form-check-input"
                        type="radio"
                        name="theme"
                        value="dark"
                        {% if profile.theme == "dark" %}checked{% endif %}>

                    <label class="form-check-label">

                        🌙 Dark Mode

                    </label>

                </div>

                <hr>

                <h5 class="mb-3">Notifications</h5>

                <div class="form-check mb-4">

                    <input
                        class="form-check-input"
                        type="checkbox"
                        name="email_notifications"
                        {% if profile.email_notifications %}checked{% endif %}>

                    <label class="form-check-label">

                        Receive Email Notifications

                    </label>

                </div>

                <button
                    type="submit"
                    class="btn btn-primary">

                    Save Settings

                </button>

            </form>

        </div>

    </div>

</div>

{% endblock %}
